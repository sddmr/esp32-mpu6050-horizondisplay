[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	electroniccats/MPU6050@^1.4.4
	adafruit/Adafruit GFX Library@^1.12.4
	adafruit/Adafruit ILI9341@^1.6.2
	paulstoffregen/XPT2046_Touchscreen@0.0.0-alpha+sha.26b691b2c8
